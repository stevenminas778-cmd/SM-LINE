<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM LINE</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Cairo;
    background: linear-gradient(270deg,#020617,#0ea5e9,#020617);
    background-size:600% 600%;
    animation:bg 12s ease infinite;
    color:#fff;
}
@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

header{text-align:center;padding:30px}

.logo img{
    width:130px;
    animation:float 3s ease-in-out infinite;
}
@keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
}

nav a{
    margin:0 10px;
    color:#fff;
    text-decoration:none;
    position:relative;
}
nav a::after{
    content:"";
    position:absolute;
    width:0;
    height:2px;
    background:#38bdf8;
    bottom:-5px;
    right:0;
    transition:.3s;
}
nav a:hover::after{width:100%;left:0}

section{
    padding:60px 20px;
    text-align:center;
    opacity:1; /* fix: always visible */
    transform:translateY(0);
    transition:1s;
}
section.show{
    opacity:1;
    transform:translateY(0);
}

.card{
    background:rgba(30,41,59,.7);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:20px;
    margin:auto;
    max-width:600px;
    transition:.4s;
}
.card:hover{
    transform:translateY(-10px) scale(1.03);
}

button{
    background:linear-gradient(45deg,#0ea5e9,#38bdf8);
    border:none;
    padding:14px 25px;
    color:#fff;
    border-radius:12px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
}
button::before{
    content:"";
    position:absolute;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,.2);
    transition:.5s;
}
button:hover::before{left:100%}
button:hover{transform:scale(1.1)}

.whatsapp{
    position:fixed;
    bottom:20px;
    left:20px;
    background:#25d366;
    padding:15px;
    border-radius:50%;
    animation:pulse 2s infinite;
}
@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.1)}
    100%{transform:scale(1)}
}

</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png" onerror="this.src='https://via.placeholder.com/130'">
<h1>SM LINE</h1>
<p>Global Import & Export</p>
</div>

<nav>
<a href="#about">عن الشركة</a>
<a href="#services">الخدمات</a>
<a href="#contact">تواصل</a>
</nav>
</header>

<section id="about">
<h2>عن الشركة</h2>
<div class="card">
<p>شركة SM LINE للاستيراد والتصدير بخبرة قوية في السوق العالمي.</p>
</div>
</section>

<section id="services">
<h2>الخدمات</h2>
<div class="card">
<p>✔ استيراد من الخارج</p>
<p>✔ تصدير لجميع الدول</p>
<p>✔ خدمات لوجستية</p>
</div>
</section>

<section id="contact">
<h2>تواصل</h2>
<div class="card">
<p>📞 01278737947</p>
<p>✉ smline2014@yahoo.com</p>

<a href="https://wa.me/201278737947?text=مرحبا، اريد الاستفسار" target="_blank">
<button>واتساب مباشر</button>
</a>

<br><br>

<a href="mailto:smline2014@yahoo.com?subject=استفسار">
<button style="background:linear-gradient(45deg,#22c55e,#4ade80)">إرسال إيميل</button>
</a>

</div>
</section>

<div class="whatsapp">
<a href="https://wa.me/201278737947" target="_blank">💬</a>
</div>

<script>
const sections=document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
const top=window.scrollY;
const offset=sec.offsetTop-400;
if(top>offset){sec.classList.add("show")}
})
});
</script>

</body>
</html>
